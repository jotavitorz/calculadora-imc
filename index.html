<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Projeto IMC</title>
</head>
<body>

    <header class="header">
        <h1>Calculadora IMC</h1>
    </header>

    <main class="main">

        <div class="container">
            
    
            <form class="form" onsubmit="return calcular(event)">
        
                <label>Peso (Kg):</label>
                <input type="text" name="peso" id="peso" placeholder="Exemplo 65"> 
            
                <label>Altura (m):</label>
                <input type="text" name="altura" id="altura" placeholder="Exemplo 1.90">
            
                <button class="button" type="submit" >Calcular IMC</button>
        
            </form>
        
            <div id="result"></div>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
